apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mirofish.fullname" . }}-uploads
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.uploads.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: backend
    spec:
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: {{ .Values.backend.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: GRAPH_BACKEND
          value: surrealdb
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: LLM_BASE_URL
          value: {{ .Values.llm.baseUrl | quote }}
        - name: LLM_MODEL_NAME
          value: {{ .Values.llm.modelName | quote }}
        - name: LLM_BOOST_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: LLM_BOOST_BASE_URL
          value: {{ .Values.llm.baseUrl | quote }}
        - name: LLM_BOOST_MODEL_NAME
          value: {{ .Values.llm.boostModelName | quote }}
        - name: SURREAL_URL
          value: "ws://{{ include "mirofish.fullname" . }}-surreal:8000"
        - name: SURREAL_NAMESPACE
          value: mirofish
        - name: SURREAL_DATABASE
          value: production
        - name: SURREAL_USER
          value: root
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: surreal-password
        - name: EMBEDDING_PROVIDER
          value: openai
        - name: EMBEDDING_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: EMBEDDING_BASE_URL
          value: {{ .Values.embedding.baseUrl | quote }}
        - name: EMBEDDING_MODEL
          value: {{ .Values.embedding.model | quote }}
        - name: EMBEDDING_DIMENSIONS
          value: {{ .Values.embedding.dimensions | quote }}
        - name: FLASK_HOST
          value: "0.0.0.0"
        - name: FLASK_PORT
          value: {{ .Values.backend.port | quote }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: uploads
          mountPath: /app/deepmiro/backend/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 45
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: {{ include "mirofish.fullname" . }}-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: backend
  ports:
  - port: {{ .Values.backend.port }}
